<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymenVPN</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #0b0f19; color: white; text-align: center; }
        .card { background: #161b22; padding: 40px; border-radius: 20px; border: 1px solid #30363d; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .btn { background: #238636; color: white; padding: 15px 30px; text-decoration: none; border-radius: 10px; font-weight: bold; display: inline-block; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: #2ea043; box-shadow: 0 0 15px #2ea043; }
        .status { color: #8b949e; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="color: #58a6ff;">УСТАНОВКА VPN</h1>
        <p>Нажмите для автоматического импорта в Hiddify</p>
        
        <a id="importBtn" class="btn" href="#">ПОДКЛЮЧИТЬ</a>
    </div>

    <script>
        const secretRawUrl = "https://gist.githubusercontent.com/kirichin/9c087d5288a1ebbece25bca4b7ee6b3c/raw/799718336fcbe66d6f4d0baf40d8955095afc24b/Gymenuk.txt"; 

        const importLink = "hiddify://import/" + secretRawUrl;
        const btn = document.getElementById('importBtn');
        btn.href = importLink;

        window.onload = function() {
            setTimeout(() => {
                window.location.href = importLink;
            }, 1500);
        };
    </script>
</body>
</html>
