<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подключение VPN</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #0f172a; color: white; text-align: center; }
        .card { background: #1e293b; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid #334155; max-width: 320px; }
        h1 { font-size: 24px; margin-bottom: 10px; color: #3b82f6; }
        p { color: #94a3b8; margin-bottom: 30px; font-size: 14px; line-height: 1.5; }
        .btn { background: #3b82f6; color: white; padding: 16px 32px; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 16px; display: inline-block; transition: all 0.2s; box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4); }
        .btn:active { transform: scale(0.98); background: #2563eb; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Настройка Hiddify</h1>
        <p>Нажмите кнопку ниже, если приложение не открылось автоматически</p>
        
        <a id="vpnLink" class="btn" href="hiddify://https://gist.githubusercontent.com/kirichin/9c087d5288a1ebbece25bca4b7ee6b3c/raw/799718336fcbe66d6f4d0baf40d8955095afc24b/Gymenuk.txt">
            ДОБАВИТЬ СЕРВЕР
        </a>
    </div>

    <script>
        window.onload = function() {
            // Задержка 1 секунда, чтобы браузер успел отрисовать страницу и разрешить переход
            setTimeout(function() {
                var link = document.getElementById('vpnLink').href;
                window.location.href = link;
            }, 1000);
        };
    </script>

</body>
</html>
